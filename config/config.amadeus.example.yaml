# 使用 Amadeus 时：复制为 config/config.yaml，或合并进你的配置
# 1) 在 https://developers.amadeus.com 注册，创建 App，拿到 Client ID / Secret
# 2) 写入项目根目录 .env（见 .env.example）
# 3) 运行: python -m flight_deal_agent verify-amadeus
# 4) 再运行: python -m flight_deal_agent run-once

app:
  name: "flight-deal-agent"
  timezone: "Asia/Shanghai"

origin_airports:
  - PVG

target_region_id: "example_europe"

trip:
  type: "round_trip"
  date_window:
    min_days_ahead: 14
    max_days_ahead: 90
    min_trip_nights: 4
    max_trip_nights: 14
    sample_every_n_days: 7
    trip_night_samples: [5, 7, 10]

currency: "CNY"

collector:
  provider: "amadeus"
  request_budget_per_run: 25

amadeus:
  test_mode: true   # true=测试环境(缓存数据); false=生产(真实票价,仍有免费额度)

storage:
  sqlite_path: "data/state/quotes.db"

alerts:
  channel: "stdout"
  digest_interval_hours: 6
  cooldown_hours: 24
  renotify_price_drop_pct: 8

thresholds:
  max_total_price: 8000
  below_median_pct: 25

scheduler:
  interval_hours: 1

api:
  host: "127.0.0.1"
  port: 8000
