app:
  name: "flight-deal-agent"
  timezone: "Asia/Shanghai"

origin_airports:
  - PVG

target_region_id: "example_europe"

trip:
  type: "round_trip"
  date_window:
    min_days_ahead: 14
    max_days_ahead: 90
    min_trip_nights: 4
    max_trip_nights: 14
    sample_every_n_days: 7
    trip_night_samples: [5, 7, 10]

currency: "CNY"

collector:
  provider: "stub"  # stub | amadeus
  request_budget_per_run: 30

amadeus:
  test_mode: true

storage:
  sqlite_path: "data/state/quotes.db"

alerts:
  channel: "stdout"  # stdout | (预留 telegram / email)
  digest_interval_hours: 6
  cooldown_hours: 24
  renotify_price_drop_pct: 8

thresholds:
  max_total_price: null        # 例如 4500（含税总价上限，null = 不限）
  below_median_pct: null       # 例如 35（低于历史中位价 35% 才报，null = 不限）

scheduler:
  interval_hours: 1

api:
  host: "127.0.0.1"
  port: 8000
